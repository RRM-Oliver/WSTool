<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Compressor & Meta Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Libraries for PDF manipulation and rasterization -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="../" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Tools
            </a>
            <h1>PDF Compressor & Meta Editor</h1>
            <p class="subtitle">Compress and edit PDF metadata directly in your browser.</p>
        </header>

        <main>
            <div id="drop-zone" class="drop-zone">
                <div class="drop-zone-content">
                    <svg class="drop-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p>Drag & drop PDFs here or <span>browse</span></p>
                    <input type="file" id="file-input" accept="application/pdf" multiple hidden>
                </div>
            </div>

                <div id="file-list" class="file-list">
                    <!-- File items with individual settings will be added here -->
                </div>

                <div class="actions-row bulk-actions hidden" id="bulk-actions">
                    <div class="bulk-info">
                        <span id="files-count-badge">0 Files</span>
                    </div>
                    <div class="button-group">
                        <button id="process-all-btn" class="btn-primary">
                            <span class="btn-text">Process All</span>
                            <div class="loader hidden"></div>
                        </button>
                        <button id="download-zip-btn" class="btn-secondary hidden">
                            Download All (ZIP)
                        </button>
                        <button id="reset-btn" class="btn-secondary">
                            Clear All
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            &copy; 2026 Web Support Tools • Privacy-first: All processing happens in your browser.
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
