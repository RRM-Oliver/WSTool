<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRM Image Optimizer and Renamer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <main class="app-container">
        <header>
            <h1 class="brand-text">RRM Studio</h1>
            <p class="subtitle">Image Optimizer and Renamer</p>
        </header>

        <section class="settings-panel card">
            <h2>Processing Settings</h2>
            <div class="settings-grid">
                <div class="setting-item">
                    <label for="targetWidth">Target Width (px)</label>
                    <input type="number" id="targetWidth" value="1080" min="100" max="8000">
                    <span class="hint">Will not upscale original images</span>
                </div>
                <div class="setting-item">
                    <label for="quality">Compression Quality (%)</label>
                    <div class="slider-container">
                        <input type="range" id="quality" min="1" max="100" value="85">
                        <span id="qualityValue">85%</span>
                    </div>
                </div>
                <div class="setting-item">
                    <label for="format">Output Format</label>
                    <select id="format">
                        <option value="image/jpeg">JPG (Standard)</option>
                        <option value="image/webp">WebP (Next-Gen)</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="targetSize">Target Size Limit (KB)</label>
                    <select id="targetSize">
                        <option value="0">Auto (Quality only)</option>
                        <option value="100">100 KB</option>
                        <option value="200">200 KB</option>
                        <option value="300">300 KB</option>
                        <option value="400">400 KB</option>
                        <option value="500">500 KB</option>
                        <option value="1000">1 MB</option>
                    </select>
                </div>
            </div>
        </section>

        <section id="dropZone" class="drop-zone card">
            <div class="drop-content">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <h3>Drop your captures here</h3>
                <p>or click to browse your system</p>
                <input type="file" id="fileInput" multiple accept="image/*" hidden>
            </div>
        </section>

        <section id="resultsSection" class="results-section" hidden>
            <div class="section-header">
                <h2>Processed Assets</h2>
                <button id="downloadAll" class="btn btn-primary" hidden>Download All (.zip)</button>
            </div>
            <div id="resultsGrid" class="results-grid"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
